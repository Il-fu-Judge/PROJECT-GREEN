<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Clienti</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="home" class="view">
        <h1>Gestione Lavori</h1>
        <div class="menu-grid">
            <button onclick="mostraPagina('nuovo-cliente')" class="btn-main">
                <i class="fas fa-user-plus"></i> Nuovo Cliente
            </button>
            <button onclick="apriGestione()" class="btn-main secondary">
                <i class="fas fa-users-cog"></i> Gestisci Cliente
            </button>
        </div>
    </div>

    <div id="gestione-cliente" class="view hidden">
        <button onclick="mostraPagina('home')" class="btn-home-float bg-blu">
            <i class="fas fa-home"></i>
        </button>
        <h2 style="text-align: center;">I Tuoi Clienti</h2>
        <div class="search-container">
            <input type="text" id="cerca-cliente" placeholder="🔍 Cerca cliente..." onkeyup="filtraClienti()">
        </div>
        <div id="lista-clienti" class="lista-container">
            <p class="caricamento">Caricamento database...</p>
        </div>
    </div>

    <div id="nuovo-cliente" class="view hidden">
        <button onclick="mostraPagina('home')" class="btn-home-float bg-verde">
            <i class="fas fa-home"></i>
        </button>
        <h2>Dettagli Cliente</h2>
        <div class="input-group">
            <label>Nome Cliente</label>
            <div class="input-row">
                <input type="text" id="cliente" placeholder="Inserisci o detta nome">
                <button onclick="avviaVocale('cliente')" class="btn-icon"><i class="fas fa-microphone"></i></button>
            </div>
        </div>
        <div class="input-group">
            <label>Telefono</label>
            <div class="input-row">
                <input type="tel" id="telefono" placeholder="Inserisci o detta numero">
                <button onclick="avviaVocale('telefono')" class="btn-icon"><i class="fas fa-microphone"></i></button>
            </div>
        </div>
        <div class="input-group">
            <label>Indirizzo</label>
            <div class="input-row">
                <input type="text" id="indirizzo" placeholder="Via, Civico, Città">
                <button onclick="ottieniPosizione()" class="btn-icon"><i class="fas fa-crosshairs"></i></button>
            </div>
        </div>
        <input type="hidden" id="gps-coords">
        <button id="btn-salva" onclick="salvaDati()" class="btn-save">SALVA NEL DATABASE</button>
    </div>

    <div id="scheda-cliente" class="view hidden">
        <button onclick="mostraPagina('gestione-cliente')" class="btn-home-float bg-blu">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h2 id="nome-cliente-titolo" style="text-align: center; color: #0d47a1;">Nome Cliente</h2>
        <div id="lista-interventi" class="lista-container"></div>
        <button onclick="nuovoIntervento()" class="btn-main" style="margin-top: 20px;">
            <i class="fas fa-plus-circle"></i> AGGIUNGI INTERVENTO
        </button>
    </div>

<div id="editor-intervento" class="view hidden" style="height: 100vh; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box;">
    
    <div class="editor-header" style="flex-shrink: 0; background: var(--bg); padding-bottom: 10px; border-bottom: 2px solid #c8e6c9;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <h2 id="titolo-editor" style="margin: 0; font-size: 1.1rem;">Dettaglio Lavoro</h2>
            <div id="contatore-lavori" style="background: var(--secondary); color: white; padding: 2px 10px; border-radius: 10px; font-weight: bold; font-size: 14px;">1 / 1</div>
        </div>

        <div style="display: flex; gap: 8px;">
            <div style="flex: 1;">
                <label style="font-size: 10px; margin:0;">DATA</label>
                <input type="date" id="data-intervento" style="padding: 8px; font-size: 14px;">
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                <div>
                    <label style="font-size: 10px; margin:0;">ORA</label>
                    <input type="time" id="ora-intervento" style="padding: 8px; font-size: 14px;">
                </div>
                <div>
                    <label style="font-size: 10px; margin:0;">STATUS</label>
                    <select id="status-intervento" style="padding: 8px; font-size: 14px; width: 100%;">
                        <option value="Da Fare">Da Fare</option>
                        <option value="Completato">Completato</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div id="righe-intervento" class="scroll-snap-container" style="flex-grow: 1; overflow-y: auto; scroll-snap-type: y mandatory; margin-top: 10px;">
        </div>

    <div class="editor-footer" style="flex-shrink: 0; padding-top: 10px; display: flex; align-items: center; gap: 10px;">
        <button onclick="aggiungiRigaLavoro()" class="btn-icon" style="width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0;">
            <i class="fas fa-plus"></i>
        </button>
        <button onclick="salvaIntervento()" class="btn-save" style="flex-grow: 1; margin: 0;">SALVA</button>
    </div>
</div>

    <div id="status-vocale" class="status-box hidden">
        <i class="fas fa-microphone fa-3x" style="color: #d32f2f; margin-bottom: 20px;"></i>
        <p style="font-size: 20px; font-weight: bold;">Ti sto ascoltando...</p>
        <button onclick="stopVocale()" class="btn-stop">STOP MANUALE</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
